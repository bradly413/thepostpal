  <text x="450" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" letter-spacing="0.14em" fill="#6F7A68" text-transform="uppercase">Carousel</text>
  <text x="450" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" letter-spacing="0.2em" fill="#B64B3A" fill-opacity="0.7">IMAGE PLACEHOLDER</text>
</svg>